apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-nginx
spec:
  # define replicaset
  replicas: 2
  selector:
    matchExpressions:
    - key: app
      values:
        - my-nginx-pods-label
        - your-nginx-pods-label
      operator: In # matchLabelsлҠ” operatorк°Җ н•ӯмғҒ Inмқҙм§Җл§Ң, matchExpressionsлҠ” operatorк°Җ лӢӨм–‘н•  мҲҳ мһҲмқҢ
  template:
    # define pod
    metadata:
      name: my-nginx-pod
      labels:
        app: my-nginx-pods-label
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80